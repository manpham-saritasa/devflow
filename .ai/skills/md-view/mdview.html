<!doctype html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>mdview</title>
    <link rel="stylesheet" href="theme.css" />
    <script src="https://cdn.jsdelivr.net/npm/marked@15/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.min.js"></script>
    <style>
        #drop-zone {
            border: 3px dashed var(--border);
            border-radius: 12px;
            padding: 48px 24px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: var(--surface-2);
        }
        #drop-zone.drag-over {
            border-color: var(--accent);
            background: var(--accent-soft);
        }
        #drop-zone p { margin: 4px 0; color: var(--muted); }
        #drop-zone .icon { font-size: 48px; margin-bottom: 16px; }
        #file-input { display: none; }
        .file-name {
            color: var(--accent);
            font-weight: 600;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>
    <main class="page">
        <div id="drop-zone">
            <div class="icon">📄</div>
            <p><strong>Drop a .md file here</strong></p>
            <p>or click to browse</p>
            <p class="file-name" id="file-name"></p>
        </div>
        <input type="file" id="file-input" accept=".md,.markdown,text/markdown">

        <div id="content"></div>
    </main>

    <script>
        mermaid.initialize({ startOnLoad: false, theme: "default" });

        const dropZone = document.getElementById("drop-zone");
        const fileInput = document.getElementById("file-input");
        const fileName = document.getElementById("file-name");
        const contentEl = document.getElementById("content");

        dropZone.addEventListener("click", () => fileInput.click());
        dropZone.addEventListener("dragover", e => { e.preventDefault(); dropZone.classList.add("drag-over"); });
        dropZone.addEventListener("dragleave", () => dropZone.classList.remove("drag-over"));
        dropZone.addEventListener("drop", e => {
            e.preventDefault();
            dropZone.classList.remove("drag-over");
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });
        fileInput.addEventListener("change", () => {
            const file = fileInput.files[0];
            if (file) handleFile(file);
        });

        // Allow page-level drop too
        document.addEventListener("dragover", e => e.preventDefault());
        document.addEventListener("drop", e => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        function handleFile(file) {
            if (!file.name.match(/\.(md|markdown)$/i)) {
                fileName.textContent = "Not a markdown file: " + file.name;
                return;
            }
            fileName.textContent = "Loading: " + file.name;
            const reader = new FileReader();
            reader.onload = () => {
                render(contentEl, reader.result);
                dropZone.style.display = "none";
            };
            reader.onerror = () => {
                fileName.textContent = "Error reading file: " + file.name;
            };
            reader.readAsText(file);
        }

        function extractFrontmatter(text) {
            if (!text.startsWith("---")) return { body: text, meta: {} };
            const end = text.indexOf("---", 4);
            if (end === -1) return { body: text, meta: {} };
            const fm = {};
            let currentKey = "";
            for (const line of text.substring(4, end).split("\n")) {
                const stripped = line.trim();
                if (!stripped) continue;
                const listMatch = stripped.match(/^\s*-\s*"?(.+?)"?\s*$/);
                if (listMatch && currentKey) {
                    fm[currentKey] = (fm[currentKey] || "") + (fm[currentKey] ? ", " : "") + listMatch[1];
                    continue;
                }
                const kv = stripped.match(/^([\w-]+):\s+(.+)$/);
                if (kv) { currentKey = kv[1]; fm[currentKey] = kv[2].replace(/^"(.*)"$/, "$1"); continue; }
                const k = stripped.match(/^([\w-]+):\s*$/);
                if (k) { currentKey = k[1]; fm[currentKey] = ""; }
            }
            return { body: text.substring(end + 4).trim(), meta: fm };
        }

        function render(container, mdText) {
            const { body: rawBody, meta } = extractFrontmatter(mdText);
            let body = rawBody;
            let title = meta.name || (body.match(/^# (.+)$/m) || [])[1] || "Document";

            let introHtml = "";
            const headingEnd = body.indexOf("\n", body.indexOf("\n") + 1);
            if (headingEnd > 0) {
                let rest = body.substring(headingEnd).trim();
                const nextH2 = rest.search(/\n## /);
                if (nextH2 > 0) {
                    const introText = rest.substring(0, nextH2).trim();
                    if (introText) { introHtml = marked.parse(introText); body = body.replace(introText, ""); }
                }
            }

            body = body.replace(/^# .+\n*/, "");
            marked.setOptions({ breaks: true, gfm: true });
            let html = marked.parse(body);

            html = html.replace(/<h2/g, '</section>\n<section class="section"><h2');
            html = html.replace(/^<\/section>\s*/, "");
            html = html.replace(/<blockquote>/g, '<div class="blockquotes">');
            html = html.replace(/<\/blockquote>/g, "</div>");

            let header = '<section class="header">';
            if (title && title.includes(": ")) {
                const parts = title.split(": ", 2);
                header += `<div class="eyebrow">${parts[0]}</div><h1>${parts[1]}</h1>`;
            } else {
                header += `<h1>${title}</h1>`;
            }
            if (introHtml) header += introHtml.replace(/<p>/g, '<p class="note">');
            if (Object.keys(meta).length) {
                header += '<div class="meta">';
                for (const [key, value] of Object.entries(meta)) {
                    header += `<div class="meta-item"><span class="meta-label">${key}</span>${value}</div>`;
                }
                header += "</div>";
            }
            header += "</section>";

            html = html.replace(/<pre><code class="language-mermaid">([\s\S]*?)<\/code><\/pre>/g, '<pre class="mermaid">$1</pre>');
            if (html.includes('class="mermaid"')) mermaid.run({ nodes: [] }).catch(() => {});

            document.title = title;
            container.innerHTML = header + html + "</section>";
        }
    </script>
</body>
</html>
